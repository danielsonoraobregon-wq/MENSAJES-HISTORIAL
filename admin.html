<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privada Encino · Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --bg-panel: #ffffff;
    --bg-hover: #f2efe7;
    --bg-active: #ebe6d8;
    --ink: #1c1a17;
    --ink-soft: #5c574e;
    --ink-mute: #918a7a;
    --line: #e8e3d8;
    --line-strong: #d4cdb9;
    --accent: #3d5240;
    --accent-soft: #e8efd9;
    --warn: #c87455;
    --warn-soft: #f8e4d8;
    --hot: #b8424a;
    --bubble-user: #f1ede1;
    --bubble-bot: #dff0d4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "DM Sans", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: "Fraunces", Georgia, serif; font-feature-settings: "ss01"; }

  button, input { font-family: inherit; font-size: inherit; color: inherit; }
  button { cursor: pointer; }

  /* ---------- LOGIN ---------- */
  .login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background:
      radial-gradient(ellipse at top left, #efeadd 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #e8efd9 0%, transparent 50%),
      var(--bg);
  }
  .login-box {
    background: var(--bg-panel);
    padding: 40px;
    border: 1px solid var(--line);
    border-radius: 4px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 1px 0 rgba(28,26,23,0.04), 0 10px 40px -10px rgba(28,26,23,0.12);
  }
  .login-box h1 {
    font-family: "Fraunces", serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1.1;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .login-box .sub {
    color: var(--ink-mute);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .login-box label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .login-box input {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 3px;
    background: var(--bg);
    transition: border-color 0.15s;
  }
  .login-box input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .login-box button.primary {
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 3px;
    margin-top: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }
  .login-box button.primary:hover { background: var(--accent); }
  .login-error {
    color: var(--hot);
    font-size: 12px;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ---------- HEADER ---------- */
  header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand h1 {
    font-family: "Fraunces", serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.015em;
  }
  .brand .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .brand .sub {
    font-size: 12px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .header-actions .status {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-actions .status .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--line-strong);
    padding: 6px 12px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--ink-soft);
    transition: all 0.15s;
  }
  .btn-ghost:hover {
    background: var(--bg-hover);
    color: var(--ink);
  }

  /* ---------- STATS BAR ---------- */
  .stats {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
    padding: 12px 24px;
    display: flex;
    gap: 28px;
    overflow-x: auto;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
    white-space: nowrap;
  }
  .stat .num {
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
  }
  .stat .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
  }
  .stat.hot .num { color: var(--hot); }
  .stat.accent .num { color: var(--accent); }

  /* ---------- FILTERS ---------- */
  .filters {
    padding: 12px 24px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .chip {
    padding: 5px 12px;
    border: 1px solid var(--line-strong);
    background: var(--bg-panel);
    border-radius: 100px;
    font-size: 12px;
    color: var(--ink-soft);
    transition: all 0.15s;
  }
  .chip:hover { background: var(--bg-hover); }
  .chip.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .chip .count {
    margin-left: 4px;
    opacity: 0.6;
    font-variant-numeric: tabular-nums;
  }
  .search-box {
    margin-left: auto;
    position: relative;
    min-width: 240px;
  }
  .search-box input {
    width: 100%;
    padding: 6px 12px 6px 30px;
    border: 1px solid var(--line-strong);
    border-radius: 3px;
    background: var(--bg);
    font-size: 13px;
  }
  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .search-box::before {
    content: "⌕";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-mute);
    font-size: 14px;
  }

  /* ---------- LAYOUT ---------- */
  .container {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 165px);
  }
  .leads-col {
    background: var(--bg-panel);
    border-right: 1px solid var(--line);
    overflow-y: auto;
  }
  .chat-col {
    overflow-y: auto;
    padding: 28px 32px;
  }

  /* ---------- LEAD CARD ---------- */
  .lead {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: background 0.1s;
    position: relative;
  }
  .lead:hover { background: var(--bg-hover); }
  .lead.active {
    background: var(--bg-active);
  }
  .lead.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .lead-score {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", serif;
    font-weight: 500;
    font-size: 13px;
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .lead-body { flex: 1; min-width: 0; }
  .lead-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .lead-name {
    font-weight: 500;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lead-time {
    font-size: 11px;
    color: var(--ink-mute);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .lead-meta {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .lead-tag {
    display: inline-block;
    padding: 1px 6px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: 2px;
    font-weight: 500;
  }
  .tag-visita { background: var(--warn-soft); color: #8a3a14; }
  .tag-congelado { background: #dbe7e8; color: #1f4d52; }
  .lead-msg {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-style: italic;
  }

  /* ---------- CHAT ---------- */
  .chat-empty {
    color: var(--ink-mute);
    text-align: center;
    padding: 120px 20px;
    font-family: "Fraunces", serif;
    font-size: 16px;
    font-style: italic;
    letter-spacing: 0.02em;
  }
  .chat-header {
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .chat-header h2 {
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .chat-header .info {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .chat-header .info b {
    color: var(--hot);
    font-weight: 500;
  }
  .visita-banner {
    background: var(--warn-soft);
    border-left: 3px solid var(--warn);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: #5a2a0c;
    border-radius: 0 3px 3px 0;
  }
  .visita-banner b {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
    display: block;
    margin-bottom: 2px;
  }

  .msg {
    margin-bottom: 12px;
    display: flex;
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg-user { justify-content: flex-start; }
  .msg-assistant { justify-content: flex-end; }
  .msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
  }
  .msg-user .msg-bubble {
    background: var(--bubble-user);
    border-bottom-left-radius: 4px;
  }
  .msg-assistant .msg-bubble {
    background: var(--bubble-bot);
    border-bottom-right-radius: 4px;
  }
  .msg-role {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-bottom: 4px;
  }

  .loading {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-mute);
    font-style: italic;
  }
  .empty-list {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-mute);
    font-size: 13px;
  }

  /* Back button mobile */
  .back-btn {
    display: none;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    padding: 0;
    margin-bottom: 12px;
  }

  /* ---------- MOBILE ---------- */
  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; height: auto; }
    .leads-col, .chat-col { height: auto; }
    .chat-col { display: none; padding: 20px; }
    .container.mobile-chat-open .leads-col { display: none; }
    .container.mobile-chat-open .chat-col { display: block; }
    .container.mobile-chat-open .back-btn { display: inline-block; }
    .stats { gap: 18px; padding: 10px 16px; }
    .stat .num { font-size: 18px; }
    .filters { padding: 10px 16px; }
    .search-box { margin-left: 0; width: 100%; }
    header { padding: 12px 16px; }
    .brand h1 { font-size: 18px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }
</style>
</head>
<body>
  <div id="app"></div>

<script>
const API_BASE = window.location.origin;
let secret = sessionStorage.getItem("encino_secret") || "";
let leads = [];
let selectedLeadKey = null;
let filter = "all";
let search = "";
let refreshTimer = null;
let lastRefreshAt = null;

function $(id) { return document.getElementById(id); }

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

function relativeTime(ts) {
  if (!ts) return "";
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return "ahora";
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h`;
  const days = Math.floor(hr / 24);
  if (days < 7) return `${days}d`;
  return new Date(ts).toLocaleDateString("es-MX", { day: "2-digit", month: "short" });
}

function fmtTime(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
}

/* ---------- ROUTER ---------- */
function render() {
  if (!secret) renderLogin();
  else renderDashboard();
}

/* ---------- LOGIN ---------- */
function renderLogin() {
  $("app").innerHTML = `
    <div class="login">
      <div class="login-box">
        <h1 class="serif">Privada Encino</h1>
        <div class="sub">Panel de conversaciones · Solo lectura</div>
        <label for="secret-input">Contraseña</label>
        <input type="password" id="secret-input" autofocus autocomplete="current-password">
        <button class="primary" onclick="doLogin()">Entrar</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  `;
  $("secret-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
}

async function doLogin() {
  const val = $("secret-input").value.trim();
  if (!val) return;
  $("login-error").textContent = "";
  try {
    const r = await fetch(`${API_BASE}/dashboard?secret=${encodeURIComponent(val)}`);
    if (r.status === 403) {
      $("login-error").textContent = "Contraseña incorrecta";
      return;
    }
    if (!r.ok) {
      $("login-error").textContent = "Error del servidor (" + r.status + ")";
      return;
    }
    const data = await r.json();
    secret = val;
    sessionStorage.setItem("encino_secret", val);
    leads = data.leads || [];
    lastRefreshAt = Date.now();
    render();
  } catch (e) {
    $("login-error").textContent = "Error de conexión";
  }
}

function logout() {
  sessionStorage.removeItem("encino_secret");
  secret = "";
  leads = [];
  selectedLeadKey = null;
  if (refreshTimer) clearInterval(refreshTimer);
  render();
}

/* ---------- DASHBOARD SHELL ---------- */
function renderDashboard() {
  $("app").innerHTML = `
    <header>
      <div class="brand">
        <h1 class="serif">Privada Encino</h1>
        <span class="dot"></span>
        <span class="sub">Panel</span>
      </div>
      <div class="header-actions">
        <span class="status"><span class="pulse"></span><span id="last-refresh">cargando…</span></span>
        <button class="btn-ghost" onclick="loadLeads(true)">Actualizar</button>
        <button class="btn-ghost" onclick="logout()">Salir</button>
      </div>
    </header>
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters"></div>
    <div class="container" id="container">
      <div class="leads-col" id="leads"></div>
      <div class="chat-col" id="chat-panel">
        <div class="chat-empty serif">Selecciona un lead para ver la conversación</div>
      </div>
    </div>
  `;
  renderStats();
  renderFilters();
  renderLeads();
  if (selectedLeadKey) loadChat(selectedLeadKey);

  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => loadLeads(false), 30000);
  updateRefreshLabel();
  setInterval(updateRefreshLabel, 1000);
}

function updateRefreshLabel() {
  if (!$("last-refresh") || !lastRefreshAt) return;
  const sec = Math.floor((Date.now() - lastRefreshAt) / 1000);
  let txt;
  if (sec < 5) txt = "actualizado";
  else if (sec < 60) txt = `hace ${sec}s`;
  else txt = `hace ${Math.floor(sec / 60)}m`;
  $("last-refresh").textContent = txt;
}

/* ---------- DATA ---------- */
async function loadLeads(manual) {
  try {
    const r = await fetch(`${API_BASE}/dashboard?secret=${encodeURIComponent(secret)}`);
    if (r.status === 403) { logout(); return; }
    if (!r.ok) return;
    const data = await r.json();
    leads = data.leads || [];
    lastRefreshAt = Date.now();
    renderStats();
    renderFilters();
    renderLeads();
    if (selectedLeadKey) loadChat(selectedLeadKey, true);
  } catch (e) {
    console.error("loadLeads", e);
  }
}

/* ---------- STATS ---------- */
function renderStats() {
  if (!$("stats")) return;
  const total = leads.length;
  const visitas = leads.filter(l => l.estado === "visita_pendiente").length;
  const congelados = leads.filter(l => l.congelado && l.estado !== "visita_pendiente").length;
  const interesados = leads.filter(l => l.scoreLabel === "Interesado").length;
  const hoy = leads.filter(l => Date.now() - l.timestamp < 86400000).length;

  $("stats").innerHTML = `
    <div class="stat"><span class="num">${total}</span><span class="lbl">Leads totales</span></div>
    <div class="stat accent"><span class="num">${hoy}</span><span class="lbl">Activos 24h</span></div>
    <div class="stat hot"><span class="num">${visitas}</span><span class="lbl">Visitas pendientes</span></div>
    <div class="stat"><span class="num">${congelados}</span><span class="lbl">Congelados</span></div>
    <div class="stat"><span class="num">${interesados}</span><span class="lbl">Interesados</span></div>
  `;
}

/* ---------- FILTERS ---------- */
function renderFilters() {
  if (!$("filters")) return;
  const counts = {
    all: leads.length,
    visita_pendiente: leads.filter(l => l.estado === "visita_pendiente").length,
    congelado: leads.filter(l => l.congelado).length,
    interesado: leads.filter(l => l.scoreLabel === "Interesado").length,
    nuevo: leads.filter(l => l.estado === "nuevo").length,
  };
  const chips = [
    { id: "all", label: "Todos" },
    { id: "visita_pendiente", label: "Visitas" },
    { id: "congelado", label: "Congelados" },
    { id: "interesado", label: "Interesados" },
    { id: "nuevo", label: "Nuevos" },
  ];
  $("filters").innerHTML = chips.map(c => `
    <button class="chip ${filter === c.id ? "active" : ""}" onclick="setFilter('${c.id}')">
      ${c.label}<span class="count">${counts[c.id] || 0}</span>
    </button>
  `).join("") + `
    <div class="search-box">
      <input type="text" placeholder="Buscar teléfono o nombre…" id="search-input"
             value="${escapeHtml(search)}" oninput="setSearch(this.value)">
    </div>
  `;
}

function setFilter(f) {
  filter = f;
  renderFilters();
  renderLeads();
}

function setSearch(s) {
  search = s;
  renderLeads();
}

/* ---------- LEADS LIST ---------- */
function filteredLeads() {
  let arr = leads;
  if (filter === "visita_pendiente") arr = arr.filter(l => l.estado === "visita_pendiente");
  else if (filter === "congelado") arr = arr.filter(l => l.congelado);
  else if (filter === "interesado") arr = arr.filter(l => l.scoreLabel === "Interesado");
  else if (filter === "nuevo") arr = arr.filter(l => l.estado === "nuevo");

  if (search) {
    const s = search.toLowerCase();
    arr = arr.filter(l =>
      String(l.telefono || "").toLowerCase().includes(s) ||
      String(l.nombre || "").toLowerCase().includes(s) ||
      String(l.clave || "").toLowerCase().includes(s) ||
      String(l.ultimoMensaje || "").toLowerCase().includes(s)
    );
  }
  return arr;
}

function renderLeads() {
  if (!$("leads")) return;
  const arr = filteredLeads();
  if (arr.length === 0) {
    $("leads").innerHTML = `<div class="empty-list">Sin resultados</div>`;
    return;
  }
  const scroll = $("leads").scrollTop;
  $("leads").innerHTML = arr.map(l => {
    const isActive = selectedLeadKey === l.clave;
    const tags = [];
    if (l.estado === "visita_pendiente") tags.push(`<span class="lead-tag tag-visita">visita</span>`);
    else if (l.congelado) tags.push(`<span class="lead-tag tag-congelado">congelado</span>`);
    return `
      <div class="lead ${isActive ? "active" : ""}" onclick="selectLead('${escapeHtml(l.clave)}')">
        <div class="lead-score" style="background:${l.scoreColor}">${escapeHtml(l.score)}</div>
        <div class="lead-body">
          <div class="lead-row">
            <span class="lead-name">${escapeHtml(l.nombre || l.telefono || l.clave)}</span>
            <span class="lead-time">${escapeHtml(relativeTime(l.timestamp))}</span>
          </div>
          <div class="lead-meta">
            ${tags.join("")}
            <span>${escapeHtml(l.scoreLabel)}</span>
            <span>·</span>
            <span>${l.mensajes} msgs</span>
          </div>
          <div class="lead-msg">${escapeHtml(l.ultimoMensaje || "—")}</div>
        </div>
      </div>
    `;
  }).join("");
  $("leads").scrollTop = scroll;
}

/* ---------- CHAT ---------- */
async function selectLead(clave) {
  selectedLeadKey = clave;
  renderLeads();
  $("container").classList.add("mobile-chat-open");
  await loadChat(clave);
}

async function loadChat(clave, silent) {
  if (!$("chat-panel")) return;
  if (!silent) {
    $("chat-panel").innerHTML = `<div class="loading">Cargando…</div>`;
  }
  try {
    const r = await fetch(`${API_BASE}/estado/${encodeURIComponent(clave)}?secret=${encodeURIComponent(secret)}`);
    if (r.status === 403) { logout(); return; }
    if (!r.ok) {
      $("chat-panel").innerHTML = `<div class="loading">Error al cargar</div>`;
      return;
    }
    const data = await r.json();
    renderChat(data);
  } catch (e) {
    $("chat-panel").innerHTML = `<div class="loading">Error de conexión</div>`;
  }
}

function renderChat(detail) {
  const lead = leads.find(l => l.clave === selectedLeadKey);
  if (!lead) return;
  const conv = (detail && detail.conversacion && detail.conversacion.contenido) || [];
  const visita = detail && detail.visita;
  const congelado = !!(detail && detail.congelado);

  const infoBits = [];
  infoBits.push(`${conv.length} mensajes`);
  infoBits.push(lead.scoreLabel);
  if (congelado) infoBits.push("<b>BOT CONGELADO</b>");
  if (lead.telefono) infoBits.push(escapeHtml(lead.telefono));

  let html = `
    <button class="back-btn" onclick="closeChat()">← Volver a leads</button>
    <div class="chat-header">
      <div>
        <h2>${escapeHtml(lead.nombre || lead.telefono || lead.clave)}</h2>
        <div class="info">${infoBits.join(" · ")}</div>
      </div>
    </div>
  `;

  if (visita && visita.detalle) {
    html += `
      <div class="visita-banner">
        <b>Visita pendiente</b>
        ${escapeHtml(visita.detalle)}
      </div>
    `;
  }

  if (conv.length === 0) {
    html += `<div class="chat-empty serif">Sin mensajes</div>`;
  } else {
    html += conv.map(m => {
      const role = m.role === "assistant" ? "Bot" : "Cliente";
      return `
        <div class="msg msg-${m.role}">
          <div>
            <div class="msg-role">${role}</div>
            <div class="msg-bubble">${escapeHtml(m.content)}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  $("chat-panel").innerHTML = html;
  // scroll to bottom on first load
  if (!detail._silentRefresh) {
    $("chat-panel").scrollTop = $("chat-panel").scrollHeight;
  }
}

function closeChat() {
  selectedLeadKey = null;
  $("container").classList.remove("mobile-chat-open");
  renderLeads();
  $("chat-panel").innerHTML = `<div class="chat-empty serif">Selecciona un lead para ver la conversación</div>`;
}

/* ---------- BOOT ---------- */
render();
if (secret) loadLeads(true);
</script>
</body>
</html>
